<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ICT Helpdesk — Level 1 Assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div class="wrap">

    <!-- INTRO -->
    <div id="screen-intro" class="card">
      <div class="tc" style="margin-bottom:30px">
        <div class="logo-mark">ICT</div>
        <h1 class="heading-xl">Knowledge Assessment</h1>
        <p class="subtext">
          60-question pool · 30 served per session · randomly ordered<br>
          Pick your answer and move on — results revealed at the end.
        </p>
      </div>

      <div class="field">
        <label for="staff-name">Your Full Name</label>
        <input type="text" id="staff-name" placeholder="e.g. Alex Johnson" autocomplete="off"/>
        <div class="err hidden" id="name-err">⚠ Please enter your name to begin.</div>
      </div>

      <div class="tag-cloud" id="cat-tags"></div>
      <button class="btn btn-primary btn-full" id="btn-start">Begin Assessment →</button>
      <p class="hint">30 questions from a randomised pool · approx. 15–20 min</p>
    </div>

    <!-- QUIZ -->
    <div id="screen-quiz" class="card hidden">
      <div class="prog-track"><div class="prog-fill" id="prog"></div></div>
      <div class="q-meta">
        <span class="badge b-blue" id="q-cat"></span>
        <div class="q-meta-right">
          <span class="badge" id="q-diff"></span>
          <span class="q-counter" id="q-num"></span>
        </div>
      </div>
      <p class="q-text" id="q-text"></p>
      <div id="q-opts"></div>
      <div class="q-nav">
        <button class="btn btn-primary hidden" id="btn-next">Next →</button>
        <button class="btn btn-primary hidden" id="btn-finish">View Results →</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="screen-results" class="card hidden">
      <div class="score-hero tc">
        <div class="score-name" id="res-name"></div>
        <div class="score-num"  id="res-pct"></div>
        <div style="margin:12px 0"><span class="badge badge-lg" id="res-grade"></span></div>
        <p class="subtext" id="res-frac"></p>
        <p class="hint"    id="res-date"></p>
      </div>

      <div class="section-label">Category Breakdown</div>
      <div id="cat-bars"></div>

      <hr class="divider"/>

      <div class="results-actions">
        <button class="btn btn-green btn-full" id="btn-pdf">
          ↓ &nbsp;Export PDF Report
        </button>
        <button class="btn btn-ghost" id="btn-restart">← Retake Quiz</button>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
